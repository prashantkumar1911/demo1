---
name: CICD Pipeline
on:
    push:
        branches:
            - main

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v6

            - name: Setup Java 21
              uses: actions/setup-java@v5
              with:
                distribution: 'temurin'
                java-version: '21'

            - name: Make Maven Executable
              run: chmod +x mvnw

            - name: Build Maven
              run: |
                ./mvnw clean package

            - name: Upload Artifacts
              uses: actions/upload-artifact@v7
              with:
                name: demo-artifact
                path: target/*.jar
                if-no-files-found: warn
                retention-days: 7

            - name: Verify build project
              run: ls -lh target

            - name: Build Docker Image
              run: |
                docker build \
                -t prashantkumar1911/demo1:${{github.sha}} \
                -t prashantkumar1911/demo1:latest \
                .

            - name: Login to Dockerhub
              uses: docker/login-action@v4
              with:
                username: prashantkumar1911
                password: ${{ secrets.DOCKER_PASSWORD }}

    deploy:
        if: github.event_name == 'push'
        runs-on: self-hosted
        needs: build

        steps:

            - name: Pull Docker Image to ec2 instance
              run: |
                docker pull prashantkumar1911/demo1:${{ github.sha }}

            - name: Stop and remove existing container
              run: |
                docker rm -f demo1-container || true

            - name: Run new Container
              run: |
                docker run -d \
                --name demo1-container \
                --restart unless-stopped \
                -p 8080:8080 \
                prashantkumar1911/demo1:${{ github.sha }}

            - name: Verify Container
              run: |
                docker ps

            - name: Remove unused images
              run: docker image prune -af

            - name: Verify Application is Running
              run: |
                sleep 20
                curl --fail http://localhost:8080

            - name: Show container logs
              if: failure()
              run: |
                docker logs demo1-container